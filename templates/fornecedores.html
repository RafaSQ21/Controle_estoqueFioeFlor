<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fornecedores</title>
</head>
<body>
    <h1>Fornecedores</h1>
    <h2>Cadastro de Fornecedor</h2>

<form action="/incluir_fornecedor" method="POST">
  <input type="text" name="nome" placeholder="Nome do fornecedor" required>

  <button type="submit">Salvar</button>
</form>
    <table border="1">
    <tr>
        <th>ID</th>
        <th>Nome</th>
    </tr>

    {% for fornecedor in fornecedores %}
    <tr>
        <td>{{ fornecedor[0] }}</td>
        <td>{{ fornecedor[1] }}</td>
    </tr>
    {% endfor %}
    </table>
    <a href="/">Voltar</a>


</body>
</html>
