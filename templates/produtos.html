<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Produtos</title>
    </head>
<body>
    <h1>Produtos</h1>
    <h2>Cadastrar Produto</h2>

<form action="/cadastrar_produto" method="POST">

    <label>Modelo:</label><br>
    <input type="text" name="modelo" required><br><br>

    <label>Tamanho:</label><br>
    <input type="text" name="tamanho" required><br><br>

    <label>ID Fornecedor:</label><br>
    <input type="number" name="fornecedor_id" required><br><br>

    <label>Quantidade:</label><br>
    <input type="number" name="quantidade" required><br><br>

    <label>Preço:</label><br>
    <input type="number" step="0.01" name="preco" required><br><br>

    <label>Preço de Custo:</label><br>
    <input type="number" step="0.01" name="preco_custo" required><br><br>

    <button type="submit">Cadastrar Produto</button>

</form>

<hr>
   <table border="1">
    <tr>
        <th>ID</th>
        <th>Modelo</th>
        <th>Tamanho</th>
        <th>ID Fornecedor</th>
        <th>Quantidade</th>
        <th>Preço</th>
        <th>Preço Custo</th>
    </tr>

    {% for produto in produtos %}
    <tr>
        <td>{{ produto[0] }}</td>
        <td>{{ produto[1] }}</td>
        <td>{{ produto[2] }}</td>
        <td>{{ produto[3] }}</td>
        <td>{{ produto[4] }}</td>
        <td> R${{ produto[5] }}</td>
        <td> R${{ produto[6] }}</td>
        <td>
          <form action="/excluir/{{produto[0]}}" method="POST">
              <button type="submit">Excluir</button>
          </form>
        </td>

    </tr>
     {% endfor %}

   </table>
    <br>
    <a href="/">Voltar</a>

</body>
</html>
