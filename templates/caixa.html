<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caixa</title>
</head>
<body>
<h1>Caixa</h1>
<h2>Venda (Caixa)</h2>

<form action="/vender" method="POST">

  <input type="number" name="produto_id" placeholder="ID do produto" required>

  <input type="number" name="quantidade" placeholder="Quantidade" required>

  <button type="submit">Finalizar Venda</button>

</form>

<h3>Registrar Saída</h3>

<form action="/caixa/saida" method="POST">
    <input type="text" name="descricao" placeholder="Descrição">
    <input type="number" step="0.01" name="valor" placeholder="Valor">
    <button type="submit">Registrar</button>
</form>

<hr>

<h3>Resumo</h3>
<p>Entradas: R$ {{ entradas }}</p>
<p>Saídas: R$ {{ saidas }}</p>
<p><b>Saldo: R$ {{ saldo }}</b></p>

<hr>

<h3>Movimentações</h3>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Produto</th>
        <th>Qtd</th>
        <th>Valor</th>
        <th>Tipo</th>
        <th>Data</th>
    </tr>

    {% for r in registros %}
    <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>
        <td>{{ r[4] }}</td>
        <td>{{ r[5] }}</td>
    </tr>
    {% endfor %}
</table>
</form>

</body>
</html>
