<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
</head>
<body>
   <h1>Clientes</h1>
   <h2>Cadastro de Cliente</h2>

<form action="/incluir_cliente" method="POST">
  <input type="text" name="nome" placeholder="Nome" required>
  <input type="text" name="sobrenome" placeholder="Sobrenome" required>
  <input type="text" name="endereco" placeholder="Endereço" required>

  <button type="submit">Salvar</button>
</form>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Sobrenome</th>
        <th>Endereço</th>
    </tr>

    {% for cliente in clientes %}
    <tr>
        <td>{{ cliente[0] }}</td>
        <td>{{ cliente[1] }}</td>
        <td>{{ cliente[2] }}</td>
        <td>{{ cliente[3] }}</td>
    </tr>
    {% endfor %}

</table>
   <a href="/">Voltar</a>

</body>
</html>
